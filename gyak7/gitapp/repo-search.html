<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Repo kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Repository kereső</h1>
    <input type="text" id="repo-search" placeholder="Repository elnevezése">

    <button class="btn btn-primary" id="search-btn">Keresés</button>

    <div id="result"></div>

    <script src="../config.js"></script>
    <script src="app.js"></script>
    <script>
        async function loadRepositories(searchText){
            try{
                const res = await fetch('https://api.github.com/search/repositories?q='
                    +  encodeURIComponent(searchText), {
                        headers: {
                            'Authorization': 'Bearer ' + GH_ACCESS_TOKEN
                        }
                    });
                if (!res.ok){
                    throw Error('Hibás válasz, státusz:' + res.status);
                }

                const data = await res.json();
                let resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const repo of data.items){
                    const repoHTML = `
                        <div class="card">
                            <p>${repo.full_name}</p>
                            <p>${repo.description}</p>
                            <p>Language: ${repo.language}</p>
                        </div>
                    `;
                    resultDiv.innerHTML += repoHTML;
                }
            }catch (err){
                console.log(err);
                alert('Hiba történt a kérés során:/');
            }
            
        }

        const searchBtn = document.querySelector('#search-btn');
        searchBtn.addEventListener('click' , () => {
            const inputElem = document.querySelector('#repo-search');
            const searchText = inputElem.value;
            
            loadRepositories(searchText);
        })
    </script>
</body>
</html>
